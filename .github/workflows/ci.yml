name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install lint + test tooling
        # The unit tests under tests/ only use the standard library, so the
        # project's heavy ML/hardware dependencies (numpy, torch, onnx, kp,
        # pyxrt, iree, ...) are deliberately NOT installed here. Those require
        # GPUs/NPUs and model weights and cannot run in CI.
        run: python -m pip install --upgrade pip ruff pytest

      - name: Ruff (static lint, no project deps required)
        run: ruff check .

      - name: Pytest (pure-logic unit tests only)
        run: pytest -q tests
